name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Matches the jvmToolchain(25) in your build.gradle.kts
          java-version: ${{ secrets.JAVA_VERSION || '25' }}
          # This single line replaces your entire previous manual caching step!
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Publish and Release to Central Portal
        env:
          # The Vanniktech plugin reads these exact property names automatically.
          # Prefixing with ORG_GRADLE_PROJECT_ injects them securely as Gradle properties.
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Fails-safe checks to ensure secrets are actually loaded
          if [ -z "$ORG_GRADLE_PROJECT_mavenCentralUsername" ] || [ -z "$ORG_GRADLE_PROJECT_mavenCentralPassword" ]; then
            echo "Error: OSSRH credentials are not set in GitHub Secrets."
            exit 1
          fi
          
          if [ -z "$ORG_GRADLE_PROJECT_signingInMemoryKey" ]; then
            echo "Error: GPG_PRIVATE_KEY is not set in GitHub Secrets."
            exit 1
          fi

          # Builds, signs, bundles, uploads, and releases to the new Central Portal API
          ./gradlew --no-daemon publishAndReleaseToMavenCentral